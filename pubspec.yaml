name: pokemon_rainbow_city_app
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  go_router: ^16.0.0
  flutter_riverpod: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/professor.png
    - assets/images/masterball.png

  fonts:
    - family: PFStardust
      fonts:
        - asset: assets/fonts/pf_stardust_bold.ttf
          weight: 700
    - family: CustomIcons
      fonts:
        - asset: assets/fonts/custom_icons.ttf

flutter_intl:
  enabled: true


